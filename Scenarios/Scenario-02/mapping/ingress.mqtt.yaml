version: 1
rules:
  - match:
      topicFilter: devices/device-01/receivers/rx-1/link-status
    target:
      location: root/receiver-monitors/rx-monitor-01
      property: linkStatus
      onUnresolved: warn
    decode:
      format: raw-number
    transform:
      - op: clamp
        min: 1
        max: 3

