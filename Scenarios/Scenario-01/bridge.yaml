instance:
  name: scenario-01
  logLevel: info

model:
  entities: model/entities.yaml
  datatypes: model/datatypes.yaml
  tree: model/tree.yaml

# The top-level `mapping` field on each adapter block is used by the bridge
# loader for cross-validation. The MQTT adapter additionally reads `mapping`
# from inside its own `config:` block (resolved relative to cwd).
ingress:
  id: mqtt-ingress
  protocol: mqtt
  mapping: mapping/ingress.mqtt.json
  config:
    url: "${MQTT_BROKER_URL:-mqtt://localhost:1883}"
    clientId: scenario-01-bridge
    subscriptions:
      - topicFilter: devices/device-01/label
        qos: 1
    mapping: mapping/ingress.mqtt.json

egress:
  - id: is12-egress
    protocol: nmos-is12
    mapping: mapping/egress.is12.json
    config:
      wsPort: 9001
      host: "0.0.0.0"
      wsPath: "/x-nmos/ncp/v1.0"
      instanceName: scenario-01
      is04:
        label: "Scenario-01 Protocol Bridge"
        description: "MQTT → IS-12 bridge for Scenario-01"
        nodeApi:
          enabled: true
          httpPort: 9002
          host: "0.0.0.0"
          advertiseHost: "localhost"
        registration:
          enabled: true
          host: "localhost"
          port: 8080
          heartbeatIntervalSec: 5
