name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Use Node.js 20.x
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: 0

      - name: Dependency audit (fail on high+)
        run: npm run audit:check

      - name: Generate SBOM
        run: npm run sbom

      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom.json
          retention-days: 90

  validate:
    needs: supply-chain
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x, 24.x]
    steps:
      - uses: actions/checkout@v7

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: 0

      - name: Build with version stamp
        run: npm run build
        env:
          GIT_COMMIT: ${{ github.sha }}
          GIT_TAG: ${{ github.ref_type == 'tag' && github.ref_name || '' }}

      - name: Typecheck, lint, architecture, and coverage
        run: npm run validate

      - name: Upload build artifact
        if: github.ref == 'refs/heads/main' && matrix.node-version == '20.x'
        uses: actions/upload-artifact@v7
        with:
          name: protocol-bridge-dist
          path: dist/
          retention-days: 30
